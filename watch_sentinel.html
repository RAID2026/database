<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sentinel Watch Remote</title>
    <style>
        html, body {
            background-color: #080710;
            color: #00f3ff;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            text-align: center;
            padding: 0;
            margin: 0;
            width: 100vw;
            box-sizing: border-box;
            overflow-x: hidden;
        }
        .page-wrap {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        }
        h2 {
            font-size: 18px;
            margin: 6px 0 12px 0;
            color: #c084fc;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 800;
        }
        .tab-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            border-bottom: 1.5px solid rgba(192, 132, 252, 0.3);
            padding-bottom: 6px;
        }
        .tab-btn {
            flex: 1;
            background: transparent;
            border: none;
            color: #64748b;
            font-size: 18px;
            font-weight: bold;
            padding: 8px 0;
            text-align: center;
            text-transform: uppercase;
            outline: none;
            transition: all 0.2s ease;
        }
        .tab-btn.active {
            color: #00f3ff;
            border-bottom: 3px solid #00f3ff;
        }
        .tab-content {
            margin-top: 10px;
        }
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .btn {
            background: rgba(0, 243, 255, 0.05);
            border: 2px solid #00f3ff;
            color: #00f3ff;
            padding: 16px 10px;
            margin: 4px 0;
            width: 100%;
            border-radius: 18px;
            font-weight: bold;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            transition: transform 0.08s ease, background 0.08s ease, box-shadow 0.08s ease;
        }
        
        /* High-Contrast Professional Active Feedback */
        .btn.btn-pressed {
            transform: scale(0.90) !important;
            background: #00f3ff !important;
            color: #080710 !important;
            box-shadow: 0 0 20px #00f3ff !important;
        }
        .btn-stop.btn-pressed {
            background: #ef4444 !important;
            color: #080710 !important;
            border-color: #ef4444 !important;
            box-shadow: 0 0 20px #ef4444 !important;
        }
        .btn-gate.btn-pressed {
            background: #10b981 !important;
            color: #080710 !important;
            border-color: #10b981 !important;
            box-shadow: 0 0 20px #10b981 !important;
        }
        
        .btn-gate {
            border-color: #10b981;
            color: #10b981;
            background: rgba(16, 185, 129, 0.05);
        }
        .btn-stop {
            border-color: #ef4444;
            color: #ef4444;
            background: rgba(239, 68, 68, 0.05);
        }
        .btn-note-active {
            background: rgba(168, 85, 247, 0.2) !important;
            border-color: #a855f7 !important;
            color: #a855f7 !important;
            box-shadow: 0 0 12px rgba(168, 85, 247, 0.5);
        }
        .select-container {
            position: relative;
            width: 100%;
            margin: 6px 0;
        }
        .select-container::after {
            content: "▼";
            font-size: 11px;
            color: #a5b4fc;
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
        }
        .select-box {
            background: rgba(0, 243, 255, 0.05);
            border: 2px solid #a5b4fc;
            color: #a5b4fc;
            padding: 16px 36px 16px 16px;
            margin: 0;
            width: 100%;
            border-radius: 18px;
            font-weight: bold;
            font-size: 16px;
            outline: none;
            text-align: center;
            text-align-last: center;
            box-sizing: border-box;
            -webkit-appearance: none;
            appearance: none;
        }
        .mic-container {
            margin-top: 18px;
            padding: 14px;
            background: rgba(0, 243, 255, 0.03);
            border: 2px dashed #00f3ff;
            border-radius: 18px;
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.1);
        }
        .input-box {
            flex: 1;
            background: transparent;
            border: none;
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            outline: none;
            text-align: left;
            padding: 4px;
            width: 0;
            min-width: 0;
        }
        .input-box::placeholder {
            color: #64748b;
            font-size: 15px;
        }
        #status {
            font-size: 11px;
            color: #64748b;
            margin-top: 15px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>
    <div class="page-wrap">
        <h2>Sentinel Watch v3</h2>
        
        <!-- Map Card -->
        <div id="map-card" style="display: none; margin-bottom: 12px; background: rgba(0, 243, 255, 0.05); border: 2px solid #00f3ff; border-radius: 18px; padding: 8px; box-sizing: border-box;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; padding: 0 4px;">
                <span id="map-title" style="font-size: 14px; font-weight: bold; color: #c084fc; letter-spacing: 0.5px;">🗺️ MAP RESULT</span>
                <button onclick="closeMap()" style="background: none; border: none; color: #ef4444; font-size: 18px; font-weight: bold; cursor: pointer; padding: 0 4px;">✕</button>
            </div>
            <img id="map-img" src="" style="width: 100%; border-radius: 12px; display: block; border: 1.5px solid rgba(0,243,255,0.3);">
            <div id="map-zoom-controls" style="display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 6px;">
                <button class="btn" onclick="sendCommand('zoom out')" style="margin: 0; padding: 10px; font-size: 14px; border-radius: 12px;">➖ OUT</button>
                <button class="btn" onclick="sendCommand('zoom in')" style="margin: 0; padding: 10px; font-size: 14px; border-radius: 12px;">➕ IN</button>
            </div>
        </div>
        
        <div class="tab-header">
            <button class="tab-btn active" onclick="openTab(event, 'tab-ir')">IR</button>
            <button class="tab-btn" onclick="openTab(event, 'tab-radio')">Radio</button>
            <button class="tab-btn" onclick="openTab(event, 'tab-gate')">Gate</button>
            <button class="tab-btn" onclick="openTab(event, 'tab-podcasts'); loadPodcasts();">Podcasts</button>
        </div>
        <!-- Tab 1: IR Remote -->
        <div id="tab-ir" class="tab-content">
            <div class="grid-2">
                <button class="btn btn-stop" onclick="sendCommand('blast power')">🔌 POWER</button>
                <button class="btn" onclick="sendCommand('blast mute')">🔇 MUTE</button>
                <button class="btn" onclick="sendCommand('blast volume_up')">🔊 VOL +</button>
                <button class="btn" onclick="sendCommand('blast volume_down')">🔉 VOL -</button>
                <button class="btn" onclick="sendCommand('blast play')">⏯️ PLAY</button>
                <button class="btn btn-stop" onclick="sendCommand('stop')">⏹️ STOP</button>
            </div>
        </div>
        <!-- Tab 2: Radio Control -->
        <div id="tab-radio" class="tab-content" style="display:none;">
            <button id="play-btn" class="btn" onclick="playRadio()" style="margin-bottom: 4px;">📻 PLAY RADIO</button>
            <button class="btn btn-stop" onclick="sendCommand('stop')" style="margin-bottom: 8px;">⏹️ STOP RADIO</button>
            
            <div style="display: grid; grid-template-columns: 1fr 1.2fr 1fr; gap: 6px; margin-bottom: 8px;">
                <button class="btn" onclick="sendCommand('volume down')">🔉 VOL-</button>
                <button class="btn" onclick="sendCommand('mute')">🔇 MUTE</button>
                <button class="btn" onclick="sendCommand('volume up')">🔊 VOL+</button>
            </div>
            
            <div class="select-container">
                <select id="fav-select" onchange="playFavorite(this)" class="select-box">
                    <option value="" disabled selected>⭐ Select Favorite...</option>
                </select>
            </div>
        </div>
        <!-- Tab 3: Gate Controller -->
        <div id="tab-gate" class="tab-content" style="display:none;">
            <div class="grid-2">
                <button class="btn btn-gate" onclick="sendCommand('open gate')">🔓 OPEN</button>
                <button class="btn btn-gate" onclick="sendCommand('close gate')">🔒 CLOSE</button>
            </div>
            <button class="btn" onclick="sendCommand('pause gate')">⏸️ PAUSE GATE</button>
            <div class="grid-2">
                <button class="btn" onclick="sendCommand('sync open')" style="font-size:11px;">🔄 SYNC OPEN</button>
                <button class="btn" onclick="sendCommand('sync closed')" style="font-size:11px;">🔄 SYNC CLOSE</button>
            </div>
        </div>
        <!-- Tab 4: Podcasts Controller -->
        <div id="tab-podcasts" class="tab-content" style="display:none;">
            <div id="podcast-list" style="max-height: 180px; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; padding: 4px; box-sizing: border-box;">
                <div style="font-size:12px;color:#64748b;">No podcasts loaded.</div>
            </div>
            <button class="btn btn-stop" onclick="sendCommand('stop')" style="margin-top: 8px;">⏹️ STOP PODCAST</button>
        </div>
        <!-- Dictation Microphone Input & Stop Assistant -->
        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 18px;">
            <div class="mic-container" onclick="focusMicInput()" style="margin-top: 0; display: flex; align-items: center; justify-content: center; gap: 10px; padding: 16px 10px; cursor: pointer;">
                <span style="font-size: 24px;">🎤</span>
                <input type="text" class="input-box" id="custom-cmd" placeholder="Dictate..." onchange="sendCustom(this)">
            </div>
            <button id="note-btn" class="btn" onclick="toggleNoteMode()" style="margin: 0; font-size: 20px; padding: 16px 10px;">📝</button>
            <button class="btn btn-stop" onclick="sendCommand('stop assistant')" style="margin: 0; font-size: 24px; padding: 16px 10px;">🛑</button>
        </div>
        <div id="status">CONNECTING...</div>
    </div>
    <script>
        let selectedStationName = 'Radio Paradise';
        let isNoteMode = false;
        let currentMapId = '';
        let pollInterval = null;
        let pollTimeout = null;
        // Fetch Phone Key from URL
        const urlParams = new URLSearchParams(window.location.search);
        const key = urlParams.get('key');
        
        if (key) {
            document.getElementById('status').innerText = "CONNECTED";
            loadFavorites();
            checkMapStatus();
        } else {
            document.getElementById('status').innerText = "MISSING KEY IN URL";
        }
        // Setup visual and haptic feedback on all buttons
        function setupButtonFeedback() {
            document.querySelectorAll('.btn').forEach(btn => {
                // Touch Start (Watch/Phone)
                btn.addEventListener('touchstart', () => {
                    btn.classList.add('btn-pressed');
                    if (navigator.vibrate) {
                        navigator.vibrate(15);
                    }
                });
                // Touch End
                btn.addEventListener('touchend', () => {
                    btn.classList.remove('btn-pressed');
                });
                btn.addEventListener('touchcancel', () => {
                    btn.classList.remove('btn-pressed');
                });
                // Mouse Fallback (Laptop/Desktop testing)
                btn.addEventListener('mousedown', () => {
                    btn.classList.add('btn-pressed');
                    if (navigator.vibrate) {
                        navigator.vibrate(15);
                    }
                });
                btn.addEventListener('mouseup', () => {
                    btn.classList.remove('btn-pressed');
                });
            });
        }
        
        // Initialize button feedback
        setupButtonFeedback();
        // Request iOS/watchOS motion permission on first tap
        function triggerPermission() {
            if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                DeviceMotionEvent.requestPermission()
                    .then(state => {
                        if (state === 'granted') {
                            document.getElementById('status').innerText = "CONNECTED (GESTURES OK)";
                        }
                    })
                    .catch(err => console.error(err));
            }
        }
        document.addEventListener('touchstart', triggerPermission, { once: true });
        document.addEventListener('click', triggerPermission, { once: true });
        // Wrist-shake gesture detection via Accelerometer
        let lastUpdate = 0;
        let lastX = 0, lastY = 0, lastZ = 0;
        let shakeTimeout = null;
        window.addEventListener('devicemotion', function(event) {
            let acc = event.accelerationIncludingGravity;
            if (!acc) return;
            
            let curTime = Date.now();
            if ((curTime - lastUpdate) > 100) {
                let diffTime = curTime - lastUpdate;
                lastUpdate = curTime;
                
                let x = acc.x || 0;
                let y = acc.y || 0;
                let z = acc.z || 0;
                
                let speed = Math.abs(x + y + z - lastX - lastY - lastZ) / diffTime * 10000;
                
                if (speed > 850) { // Shake threshold
                    if (!shakeTimeout) {
                        // Vibrate the watch (Haptic feedback)
                        if (navigator.vibrate) {
                            navigator.vibrate(120);
                        }
                        
                        // Toggle Note Mode and Focus the Mic input
                        toggleNoteMode();
                        focusMicInput();
                        
                        const statusDiv = document.getElementById('status');
                        statusDiv.innerText = "SHAKE: NOTE MODE ACTIVE";
                        statusDiv.style.color = "#a855f7";
                        
                        // Prevent multiple triggers in 2 seconds
                        shakeTimeout = setTimeout(function() {
                            shakeTimeout = null;
                            statusDiv.innerText = "CONNECTED";
                            statusDiv.style.color = "#64748b";
                        }, 2000);
                    }
                }
                
                lastX = x;
                lastY = y;
                lastZ = z;
            }
        });
        function sendCommand(cmdText, silent = false) {
            if (!key) return;
            const statusDiv = document.getElementById('status');
            if (!silent) {
                statusDiv.innerText = "SENDING...";
                statusDiv.style.color = "#00f3ff";
            }
            
            // Start battery-optimized smart polling
            startPolling();
            // Overwrite the single "latest" command node in Firebase (PUT request)
            fetch('https://sensorsconnect-d1f93-default-rtdb.firebaseio.com/sentinel_watch/latest.json', {
                method: 'PUT',
                body: JSON.stringify({
                    sender: "AppleWatch_Web",
                    message: cmdText,
                    timestamp: Date.now()
                })
            })
            .then(r => r.json())
            .then(data => {
                if (!silent) {
                    statusDiv.innerText = "SENT: " + cmdText.toUpperCase();
                    statusDiv.style.color = "#10b981";
                }
                // Instantly check once
                checkMapStatus();
            })
            .catch(err => {
                if (!silent) {
                    statusDiv.innerText = "OFFLINE";
                    statusDiv.style.color = "#ef4444";
                }
                console.error("Firebase write error:", err);
            });
        }
        function toggleNoteMode() {
            isNoteMode = !isNoteMode;
            var noteBtn = document.getElementById('note-btn');
            var inputEl = document.getElementById('custom-cmd');
            if (isNoteMode) {
                if (noteBtn) noteBtn.classList.add('btn-note-active');
                if (inputEl) inputEl.placeholder = 'Note Mode...';
            } else {
                if (noteBtn) noteBtn.classList.remove('btn-note-active');
                if (inputEl) inputEl.placeholder = 'Dictate...';
            }
        }
        
        // Helper to delay setup of button active states if elements are not fully loaded
        setTimeout(setupButtonFeedback, 500);
        function openTab(evt, tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).style.display = 'block';
            evt.currentTarget.classList.add('active');
        }
        function focusMicInput() {
            document.getElementById('custom-cmd').focus();
        }
        function sendCustom(inputEl) {
            const val = inputEl.value.trim();
            if (val) {
                if (isNoteMode) {
                    sendCommand('save note: ' + val);
                    isNoteMode = false;
                    var noteBtn = document.getElementById('note-btn');
                    if (noteBtn) noteBtn.classList.remove('btn-note-active');
                    inputEl.placeholder = 'Dictate...';
                } else {
                    sendCommand(val);
                }
                inputEl.value = '';
            }
        }
        function playRadio() {
            sendCommand('play radio ' + selectedStationName);
        }
        function playFavorite(selectEl) {
            const stationName = selectEl.value;
            if (stationName) {
                selectedStationName = stationName;
                document.getElementById('play-btn').innerText = "📻 PLAY: " + stationName.toUpperCase();
                sendCommand('play radio ' + stationName);
                setTimeout(() => { selectEl.value = ""; }, 500);
            }
        }
        // Initialize button active states
        setupButtonFeedback();
        function loadFavorites() {
            const selectEl = document.getElementById('fav-select');
            selectEl.innerHTML = '<option value="" disabled selected>Loading...</option>';
            
            // Read favorites securely from Firebase (HTTPS)
            fetch('https://sensorsconnect-d1f93-default-rtdb.firebaseio.com/radio_favorites.json')
                .then(r => r.json())
                .then(dataStr => {
                    const data = JSON.parse(dataStr || '[]');
                    selectEl.innerHTML = '<option value="" disabled selected>⭐ Select Favorite...</option>';
                    if (!data || data.length === 0) {
                        selectEl.innerHTML = '<option value="" disabled>No favorites on phone</option>';
                        return;
                    }
                    data.forEach(station => {
                        const opt = document.createElement('option');
                        opt.value = station.name;
                        opt.innerText = station.name;
                        selectEl.appendChild(opt);
                    });
                })
                .catch(err => {
                    selectEl.innerHTML = '<option value="" disabled>Load error</option>';
                    console.error("Failed to load favorites from Firebase:", err);
                });
        }
        function startPolling() {
            if (pollInterval) clearInterval(pollInterval);
            if (pollTimeout) clearTimeout(pollTimeout);
            // Poll every 2 seconds
            pollInterval = setInterval(checkMapStatus, 2000);
            // Safety timeout: stop polling after 20 seconds to save battery
            pollTimeout = setTimeout(function() {
                stopPolling();
            }, 20000);
        }
        function stopPolling() {
            if (pollInterval) {
                clearInterval(pollInterval);
                pollInterval = null;
            }
            if (pollTimeout) {
                clearTimeout(pollTimeout);
                pollTimeout = null;
            }
        }
        function checkMapStatus() {
            // Read map/picture status securely from Firebase (HTTPS)
            fetch('https://sensorsconnect-d1f93-default-rtdb.firebaseio.com/map_status.json')
                .then(r => r.json())
                .then(data => {
                    if (data && data.mapId && data.mapId !== currentMapId) {
                        currentMapId = data.mapId;
                        document.getElementById('map-img').src = data.image; // Base64 Data URL!
                        document.getElementById('map-card').style.display = 'block';
                        
                        if (data.title) {
                            document.getElementById('map-title').innerText = data.title.toUpperCase();
                            if (data.title.toUpperCase().indexOf("PICTURE") !== -1) {
                                document.getElementById('map-zoom-controls').style.display = 'none';
                            } else {
                                document.getElementById('map-zoom-controls').style.display = 'grid';
                            }
                        }
                        // SUCCESS: We received the new image, stop polling immediately to save battery!
                        stopPolling();
                    }
                })
                .catch(e => {});
        }
        function loadPodcasts() {
            const container = document.getElementById('podcast-list');
            container.innerHTML = '<div style="font-size:12px;color:#64748b;">Loading podcasts...</div>';
            
            fetch('https://sensorsconnect-d1f93-default-rtdb.firebaseio.com/watch_podcasts.json')
                .then(r => r.json())
                .then(data => {
                    container.innerHTML = '';
                    if (!data || data.length === 0) {
                        container.innerHTML = '<div style="font-size:12px;color:#64748b;">No podcasts synced. Open app on phone to sync.</div>';
                        return;
                    }
                    data.forEach(ep => {
                        if (!ep) return;
                        
                        const itemDiv = document.createElement('div');
                        itemDiv.style.borderBottom = '1px dashed rgba(0, 243, 255, 0.2)';
                        itemDiv.style.padding = '8px 0';
                        itemDiv.style.textAlign = 'left';
                        
                        const titleSpan = document.createElement('div');
                        titleSpan.style.fontSize = '12px';
                        titleSpan.style.fontWeight = 'bold';
                        titleSpan.style.color = '#a5b4fc';
                        titleSpan.style.marginBottom = '6px';
                        titleSpan.innerText = ep.title;
                        
                        const btnRow = document.createElement('div');
                        btnRow.style.display = 'grid';
                        btnRow.style.gridTemplateColumns = '1fr 1fr';
                        btnRow.style.gap = '6px';
                        
                        const btnPhone = document.createElement('button');
                        btnPhone.className = 'btn';
                        btnPhone.style.padding = '8px 0';
                        btnPhone.style.margin = '0';
                        btnPhone.style.fontSize = '12px';
                        btnPhone.innerText = '📱 PHONE';
                        btnPhone.onclick = () => {
                            sendCommand('play podcast: ' + ep.videoUrl + ' | ' + ep.title);
                        };
                        
                        const btnWatch = document.createElement('button');
                        btnWatch.className = 'btn';
                        btnWatch.style.padding = '8px 0';
                        btnWatch.style.margin = '0';
                        btnWatch.style.fontSize = '12px';
                        btnWatch.style.borderColor = '#c084fc';
                        btnWatch.style.color = '#c084fc';
                        btnWatch.style.background = 'rgba(192, 132, 252, 0.05)';
                        btnWatch.innerText = '⌚ WATCH';
                        btnWatch.onclick = () => {
                            playVideoOnWatch(ep.videoUrl, ep.title);
                        };
                        
                        btnRow.appendChild(btnPhone);
                        btnRow.appendChild(btnWatch);
                        
                        itemDiv.appendChild(titleSpan);
                        itemDiv.appendChild(btnRow);
                        
                        container.appendChild(itemDiv);
                    });
                    
                    setupButtonFeedback();
                })
                .catch(err => {
                    container.innerHTML = '<div style="font-size:12px;color:#ef4444;">Failed to load</div>';
                });
        }
        function playVideoOnWatch(url, title) {
            const overlay = document.getElementById('video-overlay');
            const player = document.getElementById('watch-video-player');
            const titleSpan = document.getElementById('video-overlay-title');
            
            titleSpan.innerText = title;
            overlay.style.display = 'flex';
            player.src = url;
            player.load();
            player.play().catch(err => {
                console.error("Autoplay failed on watch:", err);
            });
        }
        function closeWatchVideo() {
            const overlay = document.getElementById('video-overlay');
            const player = document.getElementById('watch-video-player');
            
            player.pause();
            player.src = '';
            overlay.style.display = 'none';
        }
        function closeMap() {
            document.getElementById('map-card').style.display = 'none';
        }
    </script>
    <!-- Watch Video Player Overlay -->
    <div id="video-overlay" style="display:none; position:fixed; top:0; left:0; width:100vw; height:100vh; background:#080710; z-index:9999; flex-direction:column; justify-content:center; align-items:center; box-sizing:border-box;">
        <div style="display:flex; justify-content:space-between; align-items:center; width:100%; padding:4px 8px; background:rgba(0,0,0,0.4); box-sizing:border-box;">
            <span id="video-overlay-title" style="font-size:10px; font-weight:bold; color:#00f3ff; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:75%; text-align:left;">Playing...</span>
            <button onclick="closeWatchVideo()" style="background:none; border:none; color:#ef4444; font-size:16px; font-weight:bold; padding:0 4px; cursor:pointer;">✕</button>
        </div>
        <video id="watch-video-player" controls style="width:100%; height:calc(100vh - 35px); background:black;" playsinline></video>
    </div>
</body>
</html>
