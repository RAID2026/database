<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentinel Watch</title>
    <style>
        body {
            background-color: #0d0e15;
            color: #00f0ff;
            font-family: monospace;
            text-align: center;
            padding: 10px;
            margin: 0;
        }
        h2 {
            font-size: 13px;
            margin-bottom: 15px;
            color: #a5b4fc;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1.5px solid rgba(165, 180, 252, 0.3);
            padding-bottom: 8px;
        }
        .btn {
            background: rgba(0, 240, 255, 0.08);
            border: 1.5px solid #00f0ff;
            color: #00f0ff;
            padding: 12px;
            margin: 8px 0;
            width: 100%;
            border-radius: 8px;
            font-weight: bold;
            font-size: 13px;
            box-sizing: border-box;
            outline: none;
        }
        .btn:active {
            background: #00f0ff;
            color: #000;
        }
        .btn-gate {
            border-color: #39ff14;
            color: #39ff14;
            background: rgba(57, 255, 20, 0.08);
        }
        .btn-gate:active {
            background: #39ff14;
            color: #000;
        }
        .btn-stop {
            border-color: #ff0055;
            color: #ff0055;
            background: rgba(255, 0, 85, 0.08);
        }
        .btn-stop:active {
            background: #ff0055;
            color: #000;
        }
        #status {
            font-size: 10px;
            color: #888;
            margin-top: 12px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h2>Sentinel Control</h2>
    
    <button class="btn btn-gate" onclick="sendCommand('open gate')">🔓 OPEN GATE</button>
    <button class="btn" onclick="sendCommand('play radio')">📻 PLAY RADIO</button>
    <button class="btn btn-stop" onclick="sendCommand('stop')">🛑 STOP AUDIO</button>

    <div id="status">CONNECTED</div>

    <script>
        const firebaseRestUrl = "https://sensorsconnect-d1f93-default-rtdb.firebaseio.com/chats.json";

        function sendCommand(commandText) {
            const statusDiv = document.getElementById('status');
            statusDiv.innerText = "TRANSMITTING...";
            statusDiv.style.color = "#00f0ff";
            
            const payload = {
                sender: "AppleWatch_Web",
                message: "[Voice Command] " + commandText,
                timestamp: Date.now()
            };

            fetch(firebaseRestUrl, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(payload)
            })
            .then(response => {
                if (response.ok) {
                    statusDiv.innerText = "SUCCESS: " + commandText.toUpperCase();
                    statusDiv.style.color = "#39ff14";
                } else {
                    statusDiv.innerText = "FAILED TO SEND";
                    statusDiv.style.color = "#ff0055";
                }
            })
            .catch(error => {
                statusDiv.innerText = "ERROR: " + error.message.toUpperCase();
                statusDiv.style.color = "#ff0055";
            });
        }
    </script>
</body>
</html>
