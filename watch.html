<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sentinel Redirecting...</title>
    <style>
        body {
            background-color: #080710;
            color: #00f3ff;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            text-align: center;
            padding: 40px 20px;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            box-sizing: border-box;
        }
        h2 {
            font-size: 18px;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .spinner {
            border: 4px solid rgba(0, 243, 255, 0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: #00f3ff;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        #error-msg {
            color: #ef4444;
            font-size: 14px;
            margin-top: 10px;
            font-weight: bold;
        }
    </style>
    <script>
        window.addEventListener('load', function() {
            const urlParams = new URLSearchParams(window.location.search);
            const key = urlParams.get('key');
            
            if (!key) {
                document.getElementById('loading-text').innerText = "ERROR";
                document.getElementById('error-msg').innerText = "No 'key' parameter found in URL!\nExample: ?key=1a2b3c4d";
                return;
            }
            fetch('https://sensorsconnect-d1f93-default-rtdb.firebaseio.com/server_ip/' + key + '.json')
                .then(response => {
                    if (!response.ok) throw new Error("Status " + response.status);
                    return response.json();
                })
                .then(ip => {
                    if (ip && ip.startsWith('http')) {
                        document.getElementById('loading-text').innerText = "CONNECTING...";
                        window.location.href = ip + '/dashboard';
                    } else {
                        throw new Error("Invalid IP received: " + ip);
                    }
                })
                .catch(err => {
                    document.getElementById('loading-text').innerText = "FAILED";
                    document.getElementById('error-msg').innerText = "Could not locate phone.\nMake sure the Android app is running.";
                    console.error(err);
                });
        });
    </script>
</head>
<body>
    <div class="spinner"></div>
    <h2 id="loading-text">Locating Phone...</h2>
    <div id="error-msg"></div>
</body>
</html>
